  <path d="M 50 48 L 42 48 L 42 42" stroke="#3d7a4a" stroke-width="0.7" fill="none" stroke-linecap="round"/>

  <circle cx="14" cy="48" r="2" fill="#f4ead5" stroke="#2a4d33" stroke-width="0.9"/>
  <circle cx="50" cy="48" r="2" fill="#f4ead5" stroke="#2a4d33" stroke-width="0.9"/>
  <circle cx="32" cy="55" r="2" fill="#f4ead5" stroke="#2a4d33" stroke-width="0.9"/>
