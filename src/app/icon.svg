  <title>VibeNaturals</title>

  <defs>
    <clipPath id="favClip">
      <circle cx="32" cy="32" r="28"/>
    </clipPath>
  </defs>

  <!-- Background ring -->
  <circle cx="32" cy="32" r="30" fill="#f4ead5" stroke="#2a4d33" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="28" fill="#ffffff"/>

